services:
  backend:
    build: ./backend
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/datos:/app/datos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Definimos explícitamente la URL completa
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge